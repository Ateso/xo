<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xochi — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #1a1a18;
      --cream: #f5f2ec;
      --warm: #e8e2d6;
      --accent: #3d3d2e;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--black);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow: hidden;
    }

    /* Subtle grain texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
      opacity: 0.6;
    }

    .page {
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto 1fr;
      align-items: center;
      justify-items: center;
      padding: 3rem 2rem;
      position: relative;
    }

    /* Decorative botanical line — top left */
    .deco-tl {
      position: fixed;
      top: -40px;
      left: -40px;
      width: 280px;
      opacity: 0.07;
      transform: rotate(-15deg);
      animation: drift 12s ease-in-out infinite alternate;
    }

    /* Decorative botanical line — bottom right */
    .deco-br {
      position: fixed;
      bottom: -40px;
      right: -40px;
      width: 280px;
      opacity: 0.07;
      transform: rotate(165deg);
      animation: drift 14s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      from { transform: rotate(-15deg) translateY(0); }
      to   { transform: rotate(-15deg) translateY(12px); }
    }

    /* Logo area */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-svg {
      width: min(320px, 70vw);
      height: auto;
    }

    .tagline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--accent);
      letter-spacing: 0.04em;
      margin-top: 0.25rem;
      animation: fadeUp 1.2s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Center content */
    .center {
      text-align: center;
      animation: fadeUp 1.2s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .coming-soon {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(0.7rem, 1.5vw, 0.85rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--black);
      margin: 0 auto 1.5rem;
      opacity: 0.25;
    }

    .message {
      font-size: clamp(1.05rem, 2vw, 1.2rem);
      font-style: italic;
      font-weight: 300;
      color: var(--accent);
      line-height: 1.7;
      max-width: 340px;
    }

    /* Email signup */
    .signup {
      display: flex;
      gap: 0;
      margin-top: 2rem;
      max-width: 340px;
      width: 100%;
    }

    .signup input {
      flex: 1;
      border: 1px solid rgba(26,26,24,0.25);
      border-right: none;
      background: transparent;
      padding: 0.65rem 1rem;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.95rem;
      color: var(--black);
      outline: none;
      transition: border-color 0.2s;
    }

    .signup input::placeholder {
      color: rgba(26,26,24,0.35);
      font-style: italic;
    }

    .signup input:focus {
      border-color: rgba(26,26,24,0.6);
    }

    .signup button {
      background: var(--black);
      color: var(--cream);
      border: 1px solid var(--black);
      padding: 0.65rem 1.25rem;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .signup button:hover {
      background: transparent;
      color: var(--black);
    }

    /* Footer */
    .footer {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(26,26,24,0.3);
      animation: fadeUp 1.2s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Mobile */
    @media (max-height: 600px) {
      .deco-tl, .deco-br { display: none; }
      .page { gap: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Decorative botanical elements -->
  <svg class="deco-tl" viewBox="0 0 200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M100 380 Q100 200 100 20" stroke="#1a1a18" stroke-width="1.5" fill="none"/>
    <path d="M100 280 Q60 240 40 200" stroke="#1a1a18" stroke-width="1" fill="none"/>
    <path d="M100 220 Q140 180 160 140" stroke="#1a1a18" stroke-width="1" fill="none"/>
    <path d="M100 160 Q65 120 50 80" stroke="#1a1a18" stroke-width="1" fill="none"/>
    <ellipse cx="40" cy="195" rx="22" ry="14" transform="rotate(-35 40 195)" fill="#1a1a18" opacity="0.8"/>
    <ellipse cx="160" cy="135" rx="22" ry="14" transform="rotate(35 160 135)" fill="#1a1a18" opacity="0.8"/>
    <ellipse cx="50" cy="75" rx="18" ry="11" transform="rotate(-20 50 75)" fill="#1a1a18" opacity="0.8"/>
    <circle cx="100" cy="20" r="5" fill="#1a1a18"/>
    <path d="M97 17 Q100 10 103 17" fill="#1a1a18"/>
  </svg>

  <svg class="deco-br" viewBox="0 0 200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M100 380 Q100 200 100 20" stroke="#1a1a18" stroke-width="1.5" fill="none"/>
    <path d="M100 280 Q60 240 40 200" stroke="#1a1a18" stroke-width="1" fill="none"/>
    <path d="M100 220 Q140 180 160 140" stroke="#1a1a18" stroke-width="1" fill="none"/>
    <path d="M100 160 Q65 120 50 80" stroke="#1a1a18" stroke-width="1" fill="none"/>
    <ellipse cx="40" cy="195" rx="22" ry="14" transform="rotate(-35 40 195)" fill="#1a1a18" opacity="0.8"/>
    <ellipse cx="160" cy="135" rx="22" ry="14" transform="rotate(35 160 135)" fill="#1a1a18" opacity="0.8"/>
    <ellipse cx="50" cy="75" rx="18" ry="11" transform="rotate(-20 50 75)" fill="#1a1a18" opacity="0.8"/>
    <circle cx="100" cy="20" r="5" fill="#1a1a18"/>
  </svg>

  <div class="page">

    <!-- Logo -->
    <div class="logo-wrap">
      <!--
        viewBox: 0 0 280 160
        X  center: 60,65  — two rounded bars crossing at 45°
        O  center: 175,65 — tall ellipse with heart-flower stem inside
        tagline text at y=130
      -->
      <svg class="logo-svg" viewBox="0 0 280 150" xmlns="http://www.w3.org/2000/svg" overflow="visible">

        <!-- X: two rounded rectangles rotated ±45° around center (60,65) -->
        <rect x="32" y="54" width="56" height="22" rx="11"
              transform="rotate(45 60 65)" fill="#1a1a18"/>
        <rect x="32" y="54" width="56" height="22" rx="11"
              transform="rotate(-45 60 65)" fill="#1a1a18"/>

        <!-- O: tall ellipse -->
        <ellipse cx="175" cy="60" rx="44" ry="55" fill="#1a1a18"/>

        <!-- Stem inside O -->
        <line x1="175" y1="90" x2="175" y2="38"
              stroke="#f5f2ec" stroke-width="4" stroke-linecap="round"/>

        <!-- Leaf on stem -->
        <ellipse cx="162" cy="72" rx="12" ry="5.5"
                 transform="rotate(-40 162 72)" fill="#f5f2ec"/>

        <!-- Heart-flower at top of stem -->
        <path d="M175 42
                 C175 42 166 33 166 27
                 C166 22 170 19 175 24
                 C180 19 184 22 184 27
                 C184 33 175 42 175 42Z"
              fill="#f5f2ec"/>

        <!-- Tagline -->
        <text x="140" y="138" text-anchor="middle"
              font-family="'Cormorant Garamond', Georgia, serif"
              font-style="italic" font-size="17" fill="#1a1a18" opacity="0.72">
          from nature, with love
        </text>

      </svg>
    </div>

    <!-- Center message -->
    <div class="center">
      <p class="coming-soon">Coming Soon</p>
      <div class="divider"></div>
      <p class="message">Something beautiful is growing.<br>We'll be ready soon.</p>
      <div class="signup">
        <input type="email" placeholder="your@email.com" />
        <button>Notify me</button>
      </div>
    </div>

    <!-- Footer -->
    <p class="footer">&copy; 2025 Xochi &nbsp;·&nbsp; from nature, with love</p>

  </div>

</body>
</html>
