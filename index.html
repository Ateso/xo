<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xochi — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --black: #1a1a18; --cream: #f5f2ec; --accent: #3d3d2e; }
    html, body { height: 100%; background: var(--cream); color: var(--black); font-family: 'Cormorant Garamond', Georgia, serif; overflow: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 10; opacity: 0.6; }
    .page { height: 100vh; display: grid; grid-template-rows: 1fr auto 1fr; align-items: center; justify-items: center; padding: 3rem 2rem; position: relative; }
    .deco-tl { position: fixed; top: -40px; left: -40px; width: 280px; opacity: 0.07; transform: rotate(-15deg); animation: drift 12s ease-in-out infinite alternate; }
    .deco-br { position: fixed; bottom: -40px; right: -40px; width: 280px; opacity: 0.07; transform: rotate(165deg); animation: drift 14s ease-in-out infinite alternate-reverse; }
    @keyframes drift { from { transform: rotate(-15deg) translateY(0); } to { transform: rotate(-15deg) translateY(12px); } }
    .logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .logo-svg { width: min(320px, 70vw); height: auto; }
    .center { text-align: center; animation: fadeUp 1.2s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .coming-soon { font-weight: 300; font-size: clamp(0.7rem, 1.5vw, 0.85rem); letter-spacing: 0.35em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem; }
    .divider { width: 40px; height: 1px; background: var(--black); margin: 0 auto 1.5rem; opacity: 0.25; }
    .message { font-size: clamp(1.05rem, 2vw, 1.2rem); font-style: italic; font-weight: 300; color: var(--accent); line-height: 1.7; max-width: 340px; }
    .signup { display: flex; gap: 0; margin-top: 2rem; max-width: 340px; width: 100%; }
    .signup input { flex: 1; border: 1px solid rgba(26,26,24,0.25); border-right: none; background: transparent; padding: 0.65rem 1rem; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 0.95rem; color: var(--black); outline: none; transition: border-color 0.2s; }
    .signup input::placeholder { color: rgba(26,26,24,0.35); font-style: italic; }
    .signup input:focus { border-color: rgba(26,26,24,0.6); }
    .signup button { background: var(--black); color: var(--cream); border: 1px solid var(--black); padding: 0.65rem 1.25rem; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, color 0.2s; }
    .signup button:hover { background: transparent; color: var(--black); }
    .footer { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(26,26,24,0.3); animation: fadeUp 1.2s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
    @media (max-height: 600px) { .deco-tl, .deco-br { display: none; } .page { gap: 1rem; } }
  </style>
</head>
<body>
  <svg class="deco-tl" viewBox="0 0 200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M100 380 Q100 200 100 20" stroke="#1a1a18" stroke-width="1.5" fill="none"/>
    <path d="M100 280 Q60 240 40 200" stroke="#1a1a18" stroke-width="1" fill="none"/>
    <path d="M100 220 Q140 180 160 140" stroke="#1a1a18" stroke-width="1" fill="none"/>
    <path d="M100 160 Q65 120 50 80" stroke="#1a1a18" stroke-width="1" fill="none"/>
    <ellipse cx="40" cy="195" rx="22" ry="14" transform="rotate(-35 40 195)" fill="#1a1a18" opacity="0.8"/>
    <ellipse cx="160" cy="135" rx="22" ry="14" transform="rotate(35 160 135)" fill="#1a1a18" opacity="0.8"/>
    <ellipse cx="50" cy="75" rx="18" ry="11" transform="rotate(-20 50 75)" fill="#1a1a18" opacity="0.8"/>
    <circle cx="100" cy="20" r="5" fill="#1a1a18"/>
  </svg>
  <svg class="deco-br" viewBox="0 0 200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M100 380 Q100 200 100 20" stroke="#1a1a18" stroke-width="1.5" fill="none"/>
    <path d="M100 280 Q60 240 40 200" stroke="#1a1a18" stroke-width="1" fill="none"/>
    <path d="M100 220 Q140 180 160 140" stroke="#1a1a18" stroke-width="1" fill="none"/>
    <path d="M100 160 Q65 120 50 80" stroke="#1a1a18" stroke-width="1" fill="none"/>
    <ellipse cx="40" cy="195" rx="22" ry="14" transform="rotate(-35 40 195)" fill="#1a1a18" opacity="0.8"/>
    <ellipse cx="160" cy="135" rx="22" ry="14" transform="rotate(35 160 135)" fill="#1a1a18" opacity="0.8"/>
    <ellipse cx="50" cy="75" rx="18" ry="11" transform="rotate(-20 50 75)" fill="#1a1a18" opacity="0.8"/>
    <circle cx="100" cy="20" r="5" fill="#1a1a18"/>
  </svg>
  <div class="page">
    <div class="logo-wrap">
      <svg class="logo-svg" viewBox="0 0 260 145" xmlns="http://www.w3.org/2000/svg" overflow="visible">
        <rect x="31" y="47" width="68" height="26" rx="13" transform="rotate(45 65 60)" fill="#1a1a18"/>
        <rect x="31" y="47" width="68" height="26" rx="13" transform="rotate(-45 65 60)" fill="#1a1a18"/>
        <ellipse cx="180" cy="60" rx="40" ry="55" fill="#1a1a18"/>
        <line x1="180" y1="92" x2="180" y2="34" stroke="#f5f2ec" stroke-width="4.5" stroke-linecap="round"/>
        <ellipse cx="166" cy="74" rx="13" ry="6" transform="rotate(-38 166 74)" fill="#f5f2ec"/>
        <path d="M180 38 C180 38 170 28 170 22 C170 16 174 13 180 19 C186 13 190 16 190 22 C190 28 180 38 180 38Z" fill="#f5f2ec"/>
        <text x="122" y="132" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-style="italic" font-size="16" fill="#1a1a18" opacity="0.72" letter-spacing="0.02em">from nature, with love</text>
      </svg>
    </div>
    <div class="center">
      <p class="coming-soon">Coming Soon</p>
      <div class="divider"></div>
      <p class="message">Something beautiful is growing.<br>We'll be ready soon.</p>
      <div class="signup">
        <input type="email" id="email-input" placeholder="your@email.com" />
        <button id="notify-btn" onclick="handleSignup()">Notify me</button>
      </div>
      <p id="signup-msg" style="margin-top:0.75rem;font-size:0.9rem;font-style:italic;color:#3d3d2e;min-height:1.2em;"></p>
      <script>
        async function handleSignup() {
          const input = document.getElementById('email-input');
          const btn = document.getElementById('notify-btn');
          const msg = document.getElementById('signup-msg');
          const email = input.value.trim();
          if (!email || !email.includes('@')) { msg.textContent = 'Please enter a valid email address.'; return; }
          btn.disabled = true; btn.textContent = '...'; msg.textContent = '';
          try {
            const res = await fetch('https://formspree.io/f/xeepzqej', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }, body: JSON.stringify({ email }) });
            if (res.ok) { input.value = ''; msg.textContent = "Thank you. We'll be in touch."; btn.textContent = '✓'; }
            else { msg.textContent = 'Something went wrong. Please try again.'; btn.disabled = false; btn.textContent = 'Notify me'; }
          } catch (e) { msg.textContent = 'Could not connect. Please try again.'; btn.disabled = false; btn.textContent = 'Notify me'; }
        }
        document.getElementById('email-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') handleSignup(); });
      </script>
    </div>
    <p class="footer">&copy; 2025 Xochi &nbsp;&middot;&nbsp; from nature, with love</p>
  </div>
</body>
</html>
